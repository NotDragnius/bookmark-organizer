<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sifted</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="dashboard-page dark-theme">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header class="glass-header">
        <a href="index.html" class="logo">Sifted</a>
        <nav style="display: flex; gap: 1rem;">
            <a href="gallery.html" class="btn btn-secondary">My Library</a>
            <button id="logout-btn" class="btn btn-secondary">Log Out</button>
        </nav>
    </header>

    <main class="dashboard-container">
        <div id="loading" class="text-center" style="margin-top: 100px;">Loading bookmarks...</div>

        <div id="empty-state" class="text-center" style="display: none; margin-top: 100px;">
            <div class="glass-card" style="margin: 0 auto; max-width: 400px; padding: 3rem;">
                <h2 style="margin-bottom: 1rem;">You're all caught up!</h2>
                <p style="color: var(--text-muted);">No more bookmarks to triage right now. Go browse the web!</p>
            </div>
        </div>

        <div id="triage-card" class="glass-card triage-card" style="display: none;">
            <div class="card-header">
                <a href="#" id="b-url" target="_blank" class="bookmark-link">
                    <div class="title-row">
                        <img id="b-icon" src="" class="bookmark-icon" style="display: none;" alt="Icon">
                        <h2 id="b-title" style="margin: 0;">Bookmark Title</h2>
                    </div>
                </a>
                <span id="b-date" class="date-badge"></span>
            </div>

            <div class="card-body">
                <div class="input-group">
                    <label for="b-summary">AI Summary (Editable)</label>
                    <textarea id="b-summary" class="input-field" rows="3"></textarea>
                </div>

                <div class="input-group">
                    <label>Tags</label>
                    <div id="preset-tags" class="tags-editor mb-4"
                        style="border-bottom: 1px solid var(--surface-border); padding-bottom: 0.5rem;">
                        <!-- Preset tags will be loaded here -->
                    </div>
                    <div id="b-tags" class="tags-editor">
                        <!-- Tags inserted here -->
                    </div>
                    <input type="text" id="add-tag" class="input-field mt-2" placeholder="Add custom tag + Enter">
                </div>
            </div>

            <div class="card-actions">
                <button id="btn-skip" class="btn btn-secondary action-btn">Skip</button>
                <button id="btn-post" class="btn btn-secondary action-btn" title="Post to Community">Share Post</button>
                <button id="btn-confirm" class="btn btn-primary action-btn">Confirm & Save</button>
            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/dashboard.js?v=2"></script>
</body>

</html>
