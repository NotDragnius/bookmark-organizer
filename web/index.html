<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sifted - AI Bookmark Triage</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="landing-page dark-theme">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header class="glass-header">
        <div class="logo">Sifted</div>
        <nav>
            <a href="login.html" class="btn btn-secondary">Log In</a>
            <a href="signup.html" class="btn btn-primary">Get Started</a>
        </nav>
    </header>

    <main class="hero">
        <div class="hero-content">
            <h1 class="gradient-text">Tame Your Tabs. <br>Supercharge Your Brain.</h1>
            <p>The AI-powered, ADHD-friendly bookmark repository. Automatically capture, organize, and summarize your
                links without breaking your flow.</p>
            <div class="cta-group">
                <a href="signup.html" class="btn btn-primary btn-large">Start Triaging Now</a>
            </div>
        </div>

        <div class="hero-visual">
            <div class="glass-card mockup-card">
                <div class="mockup-header">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <div class="mockup-body">
                    <h3>AI Summary</h3>
                    <p class="skeleton-text"></p>
                    <p class="skeleton-text short"></p>
                    <div class="tags">
                        <span class="tag">Productivity</span>
                        <span class="tag">AI</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
