<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookmarks - Sifted</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="gallery-page dark-theme">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <header class="glass-header">
        <a href="index.html" class="logo">Sifted</a>
        <nav style="display: flex; gap: 1rem;">
            <a href="dashboard.html" class="btn btn-secondary">Triage Queue</a>
            <button id="logout-btn" class="btn btn-secondary">Log Out</button>
        </nav>
    </header>

    <main class="gallery-container" style="padding: 100px 5% 50px 5%;">
        <div class="gallery-header"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>My Library</h2>
            <div class="search-box">
                <input type="text" id="search-input" class="input-field" placeholder="Search titles or tags..."
                    style="width: 300px; padding: 0.5rem 1rem;">
            </div>
        </div>

        <div id="loading" class="text-center">Loading library...</div>

        <div id="empty-state" class="text-center" style="display: none; padding: 3rem;">
            <p style="color: var(--text-muted);">No sorted bookmarks yet. Go triage your queue!</p>
        </div>

        <div id="bookmarks-grid" class="bookmarks-grid">
            <!-- Bookmark cards injected here -->
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/gallery.js?v=2"></script>
</body>

</html>
